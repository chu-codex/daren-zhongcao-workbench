    const DEFAULT_PAGE = '总览.html';
    const frame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    let PAGES = {};
    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }
    async function gunzip(bytes) {
      if (!('DecompressionStream' in window)) throw new Error('当前浏览器不支持在线解压，请使用新版 Chrome 打开。');
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    }
    function normalizePage(page) {
      try { page = decodeURIComponent(page || ''); } catch (error) {}
      page = String(page || '').replace(/^#/, '').replace(/^\.\//, '');
      return PAGES[page] ? page : DEFAULT_PAGE;
    }
    function loadPage(page, replace) {
      const current = normalizePage(page);
      if (location.hash !== '#' + encodeURIComponent(current)) {
        replace ? history.replaceState(null, '', '#' + encodeURIComponent(current)) : history.pushState(null, '', '#' + encodeURIComponent(current));
      }
      frame.srcdoc = PAGES[current] || '<main>页面加载失败</main>';
      document.title = '达人种草智能作战台 - ' + current.replace('.html', '');
      loading.style.display = 'none';
      frame.style.display = 'block';
    }
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'workbench-nav') loadPage(event.data.page);
    });
    window.addEventListener('hashchange', function(){ loadPage(location.hash.slice(1), true); });
    (async function boot(){
      try {
        PAGES = JSON.parse(await gunzip(b64ToBytes(DATA_B64)));
        loadPage(location.hash.slice(1) || DEFAULT_PAGE, true);
      } catch (error) {
        loading.textContent = '页面加载失败：' + error.message;
      }
    })();
