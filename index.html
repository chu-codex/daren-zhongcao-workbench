  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; background: #f6f8f4; color: #0b1f1b; font-family: Arial, "Microsoft YaHei", sans-serif; }
    button, input { font: inherit; }
    #authGate { display: none; min-height: 100vh; place-items: center; padding: 24px; background: radial-gradient(circle at 20% 10%, #e4f1e9 0, transparent 34%), #f6f8f4; }
    #authGate.is-visible { display: grid; }
    .login-card { width: min(420px, 100%); padding: 34px; border: 1px solid #cfdbd2; border-radius: 12px; background: rgba(255,255,255,.96); box-shadow: 0 18px 50px rgba(23,55,43,.12); }
    .login-mark { display: grid; place-items: center; width: 48px; height: 48px; margin-bottom: 20px; border-radius: 12px; background: #24785a; color: #fff; font-size: 22px; font-weight: 800; }
    .login-card h1 { margin: 0; font-size: 24px; }
    .login-card p { margin: 8px 0 24px; color: #687066; font-size: 14px; line-height: 1.6; }
    .login-form { display: grid; gap: 14px; }
    .login-form[hidden] { display: none; }
    .login-field { display: grid; gap: 7px; }
    .login-field span { color: #48524b; font-size: 13px; font-weight: 700; }
    .login-field input { width: 100%; min-height: 44px; border: 1px solid #cfd9d1; border-radius: 7px; padding: 0 12px; color: #20231f; background: #fff; }
    .login-field input:focus { outline: 2px solid rgba(36,120,90,.16); border-color: #69a48b; }
    .login-button { min-height: 44px; border: 0; border-radius: 7px; background: #24785a; color: #fff; font-weight: 800; cursor: pointer; }
    .login-button:disabled { cursor: wait; opacity: .6; }
    .login-error { min-height: 20px; color: #b84b43; font-size: 13px; line-height: 1.5; }
    #appShell { display: none; min-height: 100vh; }
    #appShell.is-visible { display: grid; grid-template-rows: 46px minmax(0,1fr); }
    #accountBar { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 0 18px; border-bottom: 1px solid #d9dfd5; background: #fff; color: #48524b; font-size: 12px; }
    #accountBar strong { color: #20231f; }
    #accountBar button { min-height: 30px; border: 0; border-radius: 6px; padding: 0 10px; background: #e5f2ec; color: #24785a; font-weight: 700; cursor: pointer; }
    #accountBar .role-badge { min-height: 24px; display: inline-flex; align-items: center; padding: 0 8px; border-radius: 5px; background: #eef3ef; color: #536158; font-weight: 700; }
    #accountBar .role-badge.viewer { background: #fff0da; color: #a35f13; }
    #loading { padding: 32px; font-size: 15px; color: #0b3f32; }
    #appFrame { display: none; width: 100%; height: calc(100vh - 46px); border: 0; background: #f6f8f4; }
  </style>
</head>
<body>
  <section id="authGate" aria-labelledby="loginTitle">
    <div class="login-card">
      <div class="login-mark">种</div>
      <h1 id="loginTitle">登录达人种草智能作战台</h1>
      <p id="loginIntro">请输入管理员创建的手机号和密码。未登录账号无法读取或修改业务数据。</p>
      <form class="login-form" id="loginForm">
        <label class="login-field"><span>手机号</span><input id="loginPhone" type="tel" inputmode="numeric" maxlength="11" pattern="1[0-9]{10}" autocomplete="username" placeholder="请输入 11 位手机号" required /></label>
        <label class="login-field"><span>密码</span><input id="loginPassword" type="password" autocomplete="current-password" required /></label>
        <button class="login-button" type="submit">登录</button>
        <div class="login-error" id="loginError" role="alert"></div>
      </form>
      <form class="login-form" id="passwordSetupForm" hidden>
        <label class="login-field"><span>设置新密码</span><input id="setupPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
        <label class="login-field"><span>确认新密码</span><input id="setupPasswordConfirm" type="password" autocomplete="new-password" minlength="8" required /></label>
        <button class="login-button" type="submit">保存密码并进入</button>
        <div class="login-error" id="setupError" role="alert"></div>
      </form>
    </div>
  </section>
  <section id="appShell">
    <header id="accountBar">
      <span>当前用户：<strong id="accountName"></strong></span>
      <span class="role-badge" id="accountRole"></span>
      <button type="button" id="accountManage">账号管理</button>

  <script>(function () {
  const config = window.SEED_CLOUD_SYNC_CONFIG || {};
  const baseUrl = String(config.supabaseUrl || "").replace(/\/+$/, "");
  const anonKey = String(config.anonKey || "");
  const sessionKey = "seedWorkbenchAuthSessionV1";

  function authHeaders(token, extra) {
    return {
      apikey: anonKey,
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(extra || {})
    };
  }

  async function responseJson(response) {
    const text = await response.text();
    let data = null;
    try {
      data = text ? JSON.parse(text) : null;
    } catch (error) {
      data = text;
    }
    if (!response.ok) {
      const message = data?.msg || data?.message || data?.error_description || data?.error || response.statusText;
      throw new Error(message || `HTTP ${response.status}`);
    }
    return data;
  }

  function readSession() {
    try {
      return JSON.parse(localStorage.getItem(sessionKey) || "null");
    } catch (error) {
      return null;
    }
  }

  function writeSession(session) {
    if (session) localStorage.setItem(sessionKey, JSON.stringify(session));
    else localStorage.removeItem(sessionKey);
  }

  function normalizeChinaPhone(value) {
    const digits = String(value || "").replace(/\D/g, "");
    const local = digits.startsWith("86") && digits.length === 13 ? digits.slice(2) : digits;
    if (!/^1\d{10}$/.test(local)) throw new Error("请输入正确的 11 位手机号");
    return `+86${local}`;
  }

  function displayPhone(value) {
    return String(value || "").replace(/^\+86/, "");
  }

  function phoneLoginEmail(value) {
    return `${normalizeChinaPhone(value).slice(3)}@phone.workbench.local`;
  }

  function normalizeSession(data) {
    if (!data?.access_token || !data?.refresh_token) return null;
    return {
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: Number(data.expires_at || Math.floor(Date.now() / 1000) + Number(data.expires_in || 3600)),
      token_type: data.token_type || "bearer"
    };
  }

  const client = {
    session: null,
    user: null,
    profile: null,

    roleLabel(role) {
      return { admin: "管理员", editor: "编辑人员", viewer: "只读人员" }[role] || "未知角色";
    },

    isAuthenticated() {
      return Boolean(this.session?.access_token && this.user && this.profile?.active);
    },

    canWrite() {
      return this.profile?.active && ["admin", "editor"].includes(this.profile?.role);
    },

    isAdmin() {
      return this.profile?.active && this.profile?.role === "admin";
    },

    async requestAuth(path, options) {
      const response = await fetch(`${baseUrl}/auth/v1${path}`, {
        ...(options || {}),
        headers: authHeaders(options?.token, {
          "Content-Type": "application/json",
          ...(options?.headers || {})
        })
      });
      return responseJson(response);
    },

    async refreshSession() {
      const current = this.session || readSession();
      if (!current?.refresh_token) throw new Error("登录状态已失效，请重新登录");
      const data = await this.requestAuth("/token?grant_type=refresh_token", {
        method: "POST",
        body: JSON.stringify({ refresh_token: current.refresh_token })
      });
      this.session = normalizeSession(data);
      writeSession(this.session);
      return this.session;
    },

    async getAccessToken() {
      if (!this.session) this.session = readSession();
      if (!this.session) throw new Error("请先登录");
      if (Number(this.session.expires_at || 0) * 1000 <= Date.now() + 90000) {
        await this.refreshSession();
      }
      return this.session.access_token;
    },

    async getCurrentUser() {
      const token = await this.getAccessToken();
      const response = await fetch(`${baseUrl}/auth/v1/user`, {
        headers: authHeaders(token)
      });
      return responseJson(response);
    },

    async getCurrentProfile(userId) {
      const token = await this.getAccessToken();
      const params = new URLSearchParams({
        user_id: `eq.${userId}`,
        select: "user_id,phone,display_name,role,active,must_change_password,created_at,updated_at"
      });
      const response = await fetch(`${baseUrl}/rest/v1/workbench_profiles?${params}`, {
        headers: authHeaders(token)
      });
      const rows = await responseJson(response);
      return rows?.[0] || null;
    },

    async hydrate() {
      this.user = await this.getCurrentUser();
      this.profile = await this.getCurrentProfile(this.user.id);
      if (!this.profile) throw new Error("账号尚未分配工作台权限，请联系管理员");
      if (!this.profile.active) throw new Error("账号已停用，请联系管理员");
      document.dispatchEvent(new CustomEvent("seedAuthReady", {
        detail: { user: this.user, profile: this.profile }
      }));
      return true;
    },

    async restore() {
      this.session = readSession();
      if (!this.session) return false;
      try {
        await this.hydrate();
        return true;
      } catch (error) {
        writeSession(null);
        this.session = null;
        this.user = null;
        this.profile = null;
        return false;
      }
    },

    async signIn(phone, password) {
      const data = await this.requestAuth("/token?grant_type=password", {
        method: "POST",
        body: JSON.stringify({ email: phoneLoginEmail(phone), password: String(password || "") })
      });
      this.session = normalizeSession(data);
      if (!this.session) throw new Error("登录响应缺少会话信息");
      writeSession(this.session);
      try {
        await this.hydrate();
      } catch (error) {
        await this.signOut();
        throw error;
      }
      return true;
    },

    async updatePassword(password) {
      const nextPassword = String(password || "");
      if (nextPassword.length < 8) throw new Error("密码至少需要 8 位");
      const token = await this.getAccessToken();
      const response = await fetch(`${baseUrl}/auth/v1/user`, {
        method: "PUT",
        headers: authHeaders(token, { "Content-Type": "application/json" }),
        body: JSON.stringify({ password: nextPassword })
      });
      await responseJson(response);
      await this.callAccountFunction("password_changed");
      this.profile.must_change_password = false;
      return true;
    },

    async signOut() {
      const token = this.session?.access_token;
      if (token) {
        await fetch(`${baseUrl}/auth/v1/logout`, {
          method: "POST",
          headers: authHeaders(token)
        }).catch(() => null);
      }
      writeSession(null);
      this.session = null;
      this.user = null;
      this.profile = null;
      document.dispatchEvent(new CustomEvent("seedAuthSignedOut"));
    },

    async authorizedFetch(url, options) {
      const token = await this.getAccessToken();
      const requestOptions = {
        ...(options || {}),
        headers: authHeaders(token, options?.headers || {})
      };
      let response = await fetch(url, requestOptions);
      if (response.status === 401) {
        await this.refreshSession();
        requestOptions.headers = authHeaders(this.session.access_token, options?.headers || {});
        response = await fetch(url, requestOptions);
      }
      return response;
    },

    async callAccountFunction(action, payload) {
      const response = await this.authorizedFetch(
        `${baseUrl}/functions/v1/workbench-account-admin`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action, ...(payload || {}) })
        }
      );
      return responseJson(response);
    },

    async callAccountAdmin(action, payload) {
      if (!this.isAdmin()) throw new Error("仅管理员可以管理账号");
      return this.callAccountFunction(action, payload);
    }
  };

  client.normalizeChinaPhone = normalizeChinaPhone;
  client.phoneLoginEmail = phoneLoginEmail;
  client.displayPhone = displayPhone;
  window.seedAuth = client;
})();
</script>

    const DEFAULT_PAGE = "总览.html";
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");
    const authGate = document.getElementById("authGate");
    const appShell = document.getElementById("appShell");
    let PAGES = {};
    let currentPage = DEFAULT_PAGE;

    function b64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function gunzip(bytes) {
      if ("DecompressionStream" in window) {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
        return await new Response(stream).text();
      }
      throw new Error("当前浏览器不支持在线解压，请使用新版 Chrome 打开。");
    }

    function pageNameFromHref(href) {
      if (!href) return "";
      href = String(href).replace(/^\.\//, "").replace(/[?#].*$/, "");
      return PAGES[href] ? href : "";
    }

    function normalizePage(page) {
      page = String(page || "").replace(/^#/, "").replace(/^\.\//, "").replace(/[?#].*$/, "");
      return PAGES[page] ? page : DEFAULT_PAGE;
    }

    function attachFrameNavigation() {
      const doc = frame.contentDocument;
      if (!doc || doc.__seedNavigationAttached) return;
      doc.__seedNavigationAttached = true;
      doc.addEventListener("click", (event) => {
        const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
        if (!link) return;
        const targetPage = pageNameFromHref(link.getAttribute("href"));
        if (!targetPage) return;
        event.preventDefault();
        loadPage(targetPage);
      }, true);
    }

    function loadPage(page, replaceHistory = false) {
      if (!window.seedAuth?.isAuthenticated()) return showLogin();
      currentPage = normalizePage(page);
      if (currentPage === "账号管理.html" && !window.seedAuth.isAdmin()) currentPage = DEFAULT_PAGE;
      frame.onload = attachFrameNavigation;
      frame.srcdoc = PAGES[currentPage];
      const hash = "#" + encodeURIComponent(currentPage);
      if (replaceHistory) {
        history.replaceState(null, "", hash);
      } else if (location.hash !== hash) {
        history.pushState(null, "", hash);
      }
      document.title = "达人种草智能作战台 - " + currentPage.replace(".html", "");
      loading.style.display = "none";
      frame.style.display = "block";
    }

    function showLogin(message) {
      appShell.classList.remove("is-visible");
      authGate.classList.add("is-visible");
      frame.style.display = "none";
      document.getElementById("loginError").textContent = message || "";
      document.getElementById("loginForm").hidden = false;
      document.getElementById("passwordSetupForm").hidden = true;
      document.getElementById("loginTitle").textContent = "登录达人种草智能作战台";
      document.getElementById("loginIntro").textContent = "请输入管理员创建的手机号和密码。未登录账号无法读取或修改业务数据。";
      document.title = "登录 - 达人种草智能作战台";
    }

    function showPasswordSetup() {
      appShell.classList.remove("is-visible");
      authGate.classList.add("is-visible");
      frame.style.display = "none";
      document.getElementById("loginForm").hidden = true;
      document.getElementById("passwordSetupForm").hidden = false;
      document.getElementById("loginTitle").textContent = "首次登录，请修改密码";
      document.getElementById("loginIntro").textContent = "密码至少 8 位，保存后即可进入工作台。";
      document.getElementById("setupError").textContent = "";
      document.title = "设置密码 - 达人种草智能作战台";
    }

    function showApp() {
      const profile = window.seedAuth.profile;
      authGate.classList.remove("is-visible");
      appShell.classList.add("is-visible");
      document.getElementById("accountName").textContent = profile.display_name || window.seedAuth.displayPhone(profile.phone) || "工作台成员";
      const roleNode = document.getElementById("accountRole");
      roleNode.textContent = window.seedAuth.roleLabel(profile.role);
      roleNode.className = "role-badge " + profile.role;
      document.getElementById("accountManage").hidden = !window.seedAuth.isAdmin();
      loadPage(decodeURIComponent(location.hash.slice(1) || DEFAULT_PAGE), true);
    }

    window.addEventListener("hashchange", () => {
      if (!window.seedAuth?.isAuthenticated()) return;
      loadPage(decodeURIComponent(location.hash.slice(1) || DEFAULT_PAGE), true);
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      document.getElementById("loginError").textContent = "";
      try {
        await window.seedAuth.signIn(
          document.getElementById("loginPhone").value,
          document.getElementById("loginPassword").value
        );
        document.getElementById("loginPassword").value = "";
        if (window.seedAuth.profile.must_change_password) showPasswordSetup();
        else showApp();
      } catch (error) {
        showLogin(error?.message || "登录失败，请检查账号和密码");
      } finally {
        button.disabled = false;
      }
    });

    document.getElementById("accountManage").addEventListener("click", () => loadPage("账号管理.html"));
    document.getElementById("accountLogout").addEventListener("click", async () => {
      await window.seedAuth.signOut();
      frame.srcdoc = "";
      showLogin("已安全退出");
    });

    document.getElementById("passwordSetupForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = document.getElementById("setupPassword").value;
      const confirmPassword = document.getElementById("setupPasswordConfirm").value;
      if (password !== confirmPassword) {
        document.getElementById("setupError").textContent = "两次输入的密码不一致";
        return;
      }
      const button = event.submitter;
      button.disabled = true;
      try {
        await window.seedAuth.updatePassword(password);
        document.getElementById("setupPassword").value = "";
        document.getElementById("setupPasswordConfirm").value = "";
        showApp();
      } catch (error) {
        document.getElementById("setupError").textContent = error?.message || "密码设置失败";
      } finally {
        button.disabled = false;
      }
    });

    window.seedAuth.reloadCurrentPage = () => {
      if (!window.seedAuth.isAuthenticated()) return;
      loadPage(currentPage, true);
    };

    (async function boot() {
      try {
        PAGES = JSON.parse(await gunzip(b64ToBytes(DATA_B64)));
        if (await window.seedAuth.restore()) {
          if (window.seedAuth.profile.must_change_password) showPasswordSetup();
          else showApp();
        }
        else showLogin();
      } catch (error) {
        showLogin("工作台加载失败：" + (error && error.message ? error.message : error));
        console.error(error);
      }
    })();
  </script>
