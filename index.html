    const DEFAULT_PAGE = '总览.html';
    const frame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    let PAGES = {};
    let currentPage = DEFAULT_PAGE;

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function gunzip(bytes) {
      if (!('DecompressionStream' in window)) throw new Error('当前浏览器不支持在线解压，请使用新版 Chrome 打开。');
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    }

    function pageNameFromHref(href) {
      if (!href || href === '#') return '';
      try { href = new URL(href, location.href).pathname.split('/').pop() || href; } catch (error) {}
      try { href = decodeURIComponent(String(href)); } catch (error) {}
      href = String(href).replace(/^\.\//, '').replace(/[?#].*$/, '');
      return PAGES[href] ? href : '';
    }

    function normalizePage(page) {
      try { page = decodeURIComponent(page || ''); } catch (error) {}
      page = String(page || '').replace(/^#/, '').replace(/^\.\//, '').replace(/[?#].*$/, '');
      return PAGES[page] ? page : DEFAULT_PAGE;
    }

    function attachFrameNavigation() {
      const doc = frame.contentDocument;
      if (!doc || doc.__workbenchNavBound) return;
      doc.__workbenchNavBound = true;
      doc.addEventListener('click', function(event) {
        const target = event.target && event.target.nodeType === 1 ? event.target : event.target && event.target.parentElement;
        const link = target && target.closest ? target.closest('a[href]') : null;
        if (!link) return;
        const href = link.getAttribute('data-workbench-link') || link.getAttribute('href');
        const page = pageNameFromHref(href);
        if (!page) return;
        event.preventDefault();
        event.stopPropagation();
        loadPage(page);
      }, true);
    }

    function loadPage(page, replace) {
      currentPage = normalizePage(page);
      const nextHash = '#' + encodeURIComponent(currentPage);
      if (location.hash !== nextHash) {
        replace ? history.replaceState(null, '', nextHash) : history.pushState(null, '', nextHash);
      }
      frame.onload = attachFrameNavigation;
      frame.srcdoc = PAGES[currentPage] || '<main>页面加载失败</main>';
      document.title = '达人种草智能作战台 - ' + currentPage.replace('.html', '');
      loading.style.display = 'none';
      frame.style.display = 'block';
      setTimeout(attachFrameNavigation, 50);
    }

    window.addEventListener('hashchange', function(){ loadPage(location.hash.slice(1), true); });

    (async function boot(){
      try {
        PAGES = JSON.parse(await gunzip(b64ToBytes(DATA_B64)));
        loadPage(location.hash.slice(1) || DEFAULT_PAGE, true);
      } catch (error) {
        loading.textContent = '页面加载失败：' + error.message;
      }
    })();
  </script>
