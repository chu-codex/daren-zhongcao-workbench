    const DEFAULT_PAGE = "总览.html";
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");
    let PAGES = {};
    let currentPage = DEFAULT_PAGE;

    function b64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function gunzip(bytes) {
      if ("DecompressionStream" in window) {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
        return await new Response(stream).text();
      }
      throw new Error("当前浏览器不支持在线解压，请使用新版 Chrome 打开。");
    }

    function pageNameFromHref(href) {
      if (!href) return "";
      href = String(href).replace(/^\.\//, "").replace(/[?#].*$/, "");
      return PAGES[href] ? href : "";
    }

    function normalizePage(page) {
      page = String(page || "").replace(/^#/, "").replace(/^\.\//, "").replace(/[?#].*$/, "");
      return PAGES[page] ? page : DEFAULT_PAGE;
    }

    function attachFrameNavigation() {
      const doc = frame.contentDocument;
      if (!doc) return;
      doc.addEventListener("click", (event) => {
        const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
        if (!link) return;
        const targetPage = pageNameFromHref(link.getAttribute("href"));
        if (!targetPage) return;
        event.preventDefault();
        loadPage(targetPage);
      });
    }

    function loadPage(page, replaceHistory = false) {
      currentPage = normalizePage(page);
      frame.srcdoc = PAGES[currentPage];
      frame.onload = attachFrameNavigation;
      const hash = "#" + encodeURIComponent(currentPage);
      if (replaceHistory) {
        history.replaceState(null, "", hash);
      } else if (location.hash !== hash) {
        history.pushState(null, "", hash);
      }
      document.title = "达人种草智能作战台 - " + currentPage.replace(".html", "");
      loading.style.display = "none";
      frame.style.display = "block";
    }

    window.addEventListener("hashchange", () => {
      loadPage(decodeURIComponent(location.hash.slice(1) || DEFAULT_PAGE), true);
    });

    (async function boot() {
      try {
        PAGES = JSON.parse(await gunzip(b64ToBytes(DATA_B64)));
        loadPage(decodeURIComponent(location.hash.slice(1) || DEFAULT_PAGE), true);
      } catch (error) {
        loading.textContent = "发布版加载失败：" + (error && error.message ? error.message : error);
        console.error(error);
      }
    })();
